<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Profile</title>
  <link rel="stylesheet" href="../css/global.css" />
</head>
<body>

<div class="profile-page">

  <!-- PROFILE VIEW -->
  <section id="viewMode" class="profile-card">
    <img id="viewAvatar" class="avatar" src="https://i.pravatar.cc/150?img=12" />

    <h1 id="viewName">Alex Chen</h1>
    <p id="viewCountry">Ireland</p>
    <p id="viewSector">Tech, AI</p>

    <div id="viewSkills" class="skills">
      <span class="skill">Product Management</span>
      <span class="skill">Marketing</span>
    </div>

    <p id="viewBio" class="bio">
      Looking for a technical co-founder.
    </p>

    <div class="profile-actions">
      <button id="editBtn" class="primary-btn">Edit Profile</button>
      <button id="discoverBtn" class="primary-btn">Discover Founders</button>
      <button id="messagesBtn" class="primary-btn">Messages</button>
      <button id="recommendBtn" class="primary-btn">AI Recommendations</button>
    </div>
    <button id="logoutBtn" class="logout-btn">Logout</button>

  </section>

  <!--PROFILE EDIT -->
  <section id="editMode" class="profile-card hidden">

    <h2>Edit Profile</h2>

    <!-- Avatar Upload -->
<div class="avatar-edit">
  <img id="editAvatar" class="avatar" src="https://i.pravatar.cc/150?img=12" />
  <label for="avatarInput" class="change-photo">Change photo</label>
  <input type="file" id="avatarInput" accept="image/*" hidden />
</div>

    <label>Full Name</label>
    <input id="nameInput" value="Alex Chen" />

    <label>Country</label>
    <select id="countryInput">
      <option value="">Select a country</option>
      <option value="Ireland">Ireland</option>
      <option value="United Kingdom">United Kingdom</option>
      <option value="United States">United States</option>
      <option value="Canada">Canada</option>
      <option value="Australia">Australia</option>
      <option value="Germany">Germany</option>
      <option value="France">France</option>
      <option value="Netherlands">Netherlands</option>
      <option value="India">India</option>
      <option value="Singapore">Singapore</option>
      <option value="United Arab Emirates">United Arab Emirates</option>
      <option value="Brazil">Brazil</option>
      <option value="Japan">Japan</option>
      <option value="South Korea">South Korea</option>
      <option value="Spain">Spain</option>
      <option value="Italy">Italy</option>
      <option value="Sweden">Sweden</option>
      <option value="Switzerland">Switzerland</option>
      <option value="Portugal">Portugal</option>
      <option value="Nigeria">Nigeria</option>
    </select>

    <label>Sector</label>
    <input id="sectorInput" value="Tech, AI" />

    <label>Select Your Skills</label>
    <div id ="skillsContainer" class="skills-list">
      <!--tags rendered here by JS-->
    </div>
    

    <label>Short Bio</label>
    <textarea id="bioInput" maxlength="100">Looking for a technical co-founder.</textarea>

    <div class="actions">
      <button id="saveBtn" class="primary-btn">Save</button>
      <button id="cancelBtn" class="secondary-btn">Cancel</button>
    </div>

  </section>

</div>



<script src="../js/profile.js"></script>
</body>
</html>
